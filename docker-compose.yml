# Rankivo — SEO AI Tools
# Docker Compose: Flask app + PostgreSQL.

services:
  # ── PostgreSQL (optional) ──────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: rankivo
      POSTGRES_PASSWORD: rankivo_secret
      POSTGRES_DB: rankivo
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rankivo -d rankivo"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  # ── Rankivo Flask App ──────────────────────────────
  web:
    build: .
    restart: unless-stopped
    ports:
      - "5500:5500"
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://rankivo:rankivo_secret@db:5432/rankivo
      PORT: "5500"
    volumes:
      - ./data:/app/data

volumes:
  pgdata:
